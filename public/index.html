<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作業打刻・日報生成</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <p>AndroidApp / Rank 81</p>
    <h1>作業打刻・日報生成</h1>
    <p>開始終了ボタン、成果メモ、写真付き日報を生成する。入力、確認、履歴保存、次アクションを同じ作業単位で扱えるようにする。</p>
  </header>
  <main id="closed-alpha-preview">
    <section>
      <h2>Closed Alpha Focus</h2>
      <p>スマホから打刻し、PC作業へ流用できる日本語日報を作る。</p>
    </section>
    <section>
      <h2>Required Fields</h2>
      <ul>
<li><code>id</code></li>
<li><code>title</code></li>
<li><code>startedAt</code></li>
<li><code>endedAt</code></li>
<li><code>outcome</code></li>
<li><code>owner</code></li>
      </ul>
    </section>
    <section id="app"></section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
